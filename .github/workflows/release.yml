name: Release

on:
  workflow_dispatch:
    inputs:
      increment:
        description: "Version bump type"
        required: true
        default: PATCH
        type: choice
        options:
          - PATCH
          - MINOR
          - MAJOR

permissions:
  contents: write

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version and update changelog
        run: uv run --with commitizen cz bump --yes --increment "${{ inputs.increment }}"

      - name: Push release commit and tag
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          if [ -z "$RELEASE_PAT" ]; then
            echo "::error::Missing RELEASE_PAT secret. Add a fine-grained PAT with Contents: Read and write."
            exit 1
          fi

          git remote set-url origin "https://x-access-token:${RELEASE_PAT}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin HEAD:main --follow-tags
