name: Release

on:
  workflow_dispatch:
    inputs:
      increment:
        description: "Version bump type"
        required: true
        default: PATCH
        type: choice
        options:
          - PATCH
          - MINOR
          - MAJOR

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version and update changelog
        run: uv run --with commitizen cz bump --yes --increment "${{ inputs.increment }}"

      - name: Read new version
        id: ver
        run: echo "version=$(uv run --with commitizen cz version -p)" >> "$GITHUB_OUTPUT"

      - name: Push release branch and tag
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_PAT }}
        run: |
          if [ -z "$RELEASE_PAT" ]; then
            echo "::error::Missing RELEASE_PAT secret. Add a PAT with Contents and Pull requests write access."
            exit 1
          fi

          git remote set-url origin "https://x-access-token:${RELEASE_PAT}@github.com/${GITHUB_REPOSITORY}.git"
          branch="release/v${{ steps.ver.outputs.version }}"
          # Push the bump commit to a dedicated branch (main stays protected).
          git push origin "HEAD:refs/heads/${branch}"
          # Push the tag (not covered by the branch ruleset) to trigger Publish to PyPI.
          git push origin "v${{ steps.ver.outputs.version }}"

      - name: Open pull request to main
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          gh pr create \
            --base main \
            --head "release/v${{ steps.ver.outputs.version }}" \
            --title "chore(release): v${{ steps.ver.outputs.version }}" \
            --body "Automated release for v${{ steps.ver.outputs.version }}. Tag pushed and Publish to PyPI is running; merge this PR to land the version bump and changelog on main."
